<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">


</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-sm bg-white shadow-md rounded-lg p-8">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Login
        </h2>
        {%  for message in messages  %}
        <p class="text-red-500">{{message}}</p>
        {% endfor %}

        <form method="POST"  >
            {% csrf_token %}
            <!-- Username -->
            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                    Username
                </label>
                <input
                    type="text"
                    id="username"
                    placeholder="Enter username"
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                    name="username"
                >
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    Password
                </label>
                <div class="relative"> 
                     <input
                    type="password"
                  
                    placeholder="Enter password"
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                    name="password"
                    id = "password-field"
                >
                <i id = "toggle-icon" onClick ='togglePassword()' class="fa fa-eye absolute top-3 right-3" aria-hidden="true"></i>

                </div>
               
            </div>

            <!-- Remember Me -->
            <div class="flex items-center mb-6">
                <input
                    type="checkbox"
                    id="remember"
                    name="remember-me"
                    class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                >
                <label for="remember" class="ml-2 text-sm text-gray-700">
                    Remember Me
                </label>
            </div>

            <!-- Login Button -->
            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-md transition duration-200"
            >
                Login
            </button>
        </form>
    </div>
<script>
    function togglePassword() {
        const passwordField = document.getElementById('password-field')
        const toggleIcon = document.getElementById('toggle-icon')

        if (passwordField.type == "password") {
            passwordField.type = "text"
            toggleIcon.classList.remove('fa-eye')
            toggleIcon.classList.add('fa-eye-slash')
        } else {
            passwordField.type = "password"
            toggleIcon.classList.remove('fa-eye-slash')
            toggleIcon.classList.add('fa-eye')
        }
        }
</script>
</body>
</html>
