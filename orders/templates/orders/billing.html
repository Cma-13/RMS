<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Billing</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 min-h-screen">

<div class="max-w-4xl mx-auto py-10 px-5">

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

        <div class="bg-slate-900 text-white px-6 py-4">

            <h2 class="text-xl font-semibold">

                Billing Counter
            </h2>

        </div>

        <div class="p-6">

            <h3 class="text-2xl font-bold text-slate-900">

                {{ order_item.menu_item.name }}

            </h3>

            <div class="mt-5 grid grid-cols-2 gap-4">

                <div>

                    <p class="text-sm text-slate-500">

                        Order

                    </p>

                    <p class="font-semibold">

                        #{{ order_item.order.id }}

                    </p>

                </div>

                <div>

                    <p class="text-sm text-slate-500">

                        Quantity

                    </p>

                    <p class="font-semibold">

                        {{ order_item.quantity }}

                    </p>

                </div>

                <div>

                    <p class="text-sm text-slate-500">

                        Priority

                    </p>

                    <p class="font-semibold">

                        {{ order_item.get_priority_display }}

                    </p>

                </div>

                <div>

                    <p class="text-sm text-slate-500">

                        Estimated Time

                    </p>

                    <p class="font-semibold">

                        {{ order_item.menu_item.est_time }} mins

                    </p>

                </div>

            </div>

            <hr class="my-8">

            <div class="flex gap-3">

                <form method="post">

                    {% csrf_token %}

                    <input type="hidden" name="order_id" value="{{ order_item.id }}">

                    <input type="hidden" name="status" value="ready">

                    <button
                        class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg">

                        Ready

                    </button>

                </form>

                <form method="post">

                    {% csrf_token %}

                    <input type="hidden" name="order_id" value="{{ order_item.id }}">

                    <input type="hidden" name="status" value="cancel">

                    <button
                        class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg">

                        Cancel

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
